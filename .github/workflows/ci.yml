name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    name: Go CI
    permissions:
      contents: read
    uses: sebastienrousseau/pipelines/.github/workflows/go-ci.yml@3b0c5ce38f72e1b765265a172ac7407daad7f244
    with:
      go-version: '1.26.1'
      run-cross-platform: true
      run-coverage: true
