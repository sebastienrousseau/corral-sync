name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    name: Go CI
    permissions:
      contents: read
    uses: sebastienrousseau/pipelines/.github/workflows/go-ci.yml@d9cb8b34257036b6ed44a0333d4093f447c1b8cc
    with:
      go-version: '1.26.1'
      run-cross-platform: true
      run-coverage: true
